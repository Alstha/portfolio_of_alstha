<!doctype html>
<html lang="ne">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#05070a">
  <meta name="description" content="परिवार सुरक्षा — लगइन">
  <title>{{ app_name }} — लगइन</title>

  <!-- PWA Links -->
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Fraunces', 'Noto Sans Devanagari', serif;
      --font-ui: 'Inter', 'Noto Sans Devanagari', sans-serif;

      --bg-start: #05070a;
      --bg-end: #10151f;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-hover: rgba(255, 255, 255, 0.10);
      --text: #f0f2f8;
      --text-muted: rgba(240, 242, 248, 0.55);
      --accent: #10b981;
      --accent-bright: #34d399;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --accent-hover: #0ea572;
      --danger: #f87171;
      --danger-bg: rgba(248, 113, 113, 0.08);
      --danger-border: rgba(248, 113, 113, 0.2);
      --input-bg: rgba(255, 255, 255, 0.05);
      --input-border: rgba(255, 255, 255, 0.12);
      --input-focus: rgba(16, 185, 129, 0.4);
      --radius: 18px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px;
      background:
        radial-gradient(circle at 12% 8%, rgba(16,185,129,0.16) 0%, transparent 38%),
        radial-gradient(circle at 88% 92%, rgba(16,185,129,0.10) 0%, transparent 42%),
        linear-gradient(165deg, var(--bg-start) 0%, var(--bg-end) 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    @keyframes fade-up {
      0% { opacity: 0; transform: translateY(20px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* Signature: a slow breathing ring on the brand mark — the same
       calm "currently watching" cue used on the viewer screen. */
    @keyframes breathe-ring {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50% { transform: scale(1.32); opacity: 0; }
    }

    main {
      position: relative;
      z-index: 1;
      width: min(100%, 400px);
      padding: 38px 30px 32px;
      background: rgba(10, 14, 20, 0.72);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(30px) saturate(1.4);
      -webkit-backdrop-filter: blur(30px) saturate(1.4);
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 6px;
    }

    .brand-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent) 0%, #059669 100%);
      box-shadow: 0 4px 20px var(--accent-glow);
      flex-shrink: 0;
    }

    .brand-icon::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 20px;
      border: 1.5px solid rgba(16, 185, 129, 0.5);
      animation: breathe-ring 3s ease-in-out infinite;
    }

    .brand-icon svg {
      width: 26px;
      height: 26px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-icon img {
      width: 32px;
      height: 32px;
      display: block;
    }

    .brand h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--text);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 28px;
    }

    .warning {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding: 12px 14px;
      border: 1px solid var(--danger-border);
      border-radius: var(--radius-sm);
      color: var(--danger);
      background: var(--danger-bg);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .warning svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--danger);
      stroke-width: 2;
      flex-shrink: 0;
    }

    .field {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .field-input {
      width: 100%;
      min-height: 52px;
      padding: 14px 16px;
      border: 1px solid var(--input-border);
      border-radius: var(--radius-sm);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .field-input::placeholder {
      color: rgba(240, 242, 248, 0.25);
    }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--input-focus);
      background: rgba(255, 255, 255, 0.07);
    }

    .submit-btn {
      width: 100%;
      min-height: 54px;
      margin-top: 6px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent) 0%, #059669 100%);
      color: #03150d;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 4px 20px var(--accent-glow);
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px var(--accent-glow);
    }

    .submit-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Shimmer effect on button */
    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.2) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }

    .passkey-btn {
      width: 100%;
      min-height: 50px;
      margin-top: 12px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: inherit;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s ease;
    }

    .passkey-btn:hover {
      background: var(--glass-hover);
    }

    .passkey-btn svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .passkey-status {
      min-height: 18px;
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 0.82rem;
      text-align: center;
    }

    .hidden { display: none !important; }

    .bio-info-banner {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--text-muted);
    }

    .bio-info-banner .row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .bio-info-banner svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: var(--accent-bright);
      stroke-width: 2;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 500;
    }

    .footer svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      vertical-align: -2px;
      margin-right: 4px;
    }

    /* Desktop tweaks */
    @media (min-width: 768px) {
      main {
        padding: 44px 38px 38px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .brand-icon::after, .submit-btn::after { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <img src="/static/logo.svg" alt="">
      </div>
      <h1>{{ app_name }}</h1>
    </div>
    <p class="subtitle">बच्चाको हेरचाह प्रणाली</p>

    {% if not configured %}
      <div class="warning" role="alert">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        सर्भरमा पासवर्ड सेट गरिएको छैन।
      </div>
    {% endif %}

    <form action="/login" method="post" id="loginForm">
      <div class="field">
        <label class="field-label" for="usernameInput">प्रयोगकर्ता नाम</label>
        <input
          id="usernameInput"
          class="field-input"
          name="username"
          autocomplete="username"
          placeholder="प्रयोगकर्ता नाम लेख्नुहोस्"
          required
          autofocus
        >
      </div>
      <div class="field">
        <label class="field-label" for="passwordInput">पासवर्ड</label>
        <input
          id="passwordInput"
          class="field-input"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="पासवर्ड लेख्नुहोस्"
          required
        >
      </div>
      <button type="submit" class="submit-btn" id="loginButton">भित्र जानुहोस्</button>
    </form>
    <button type="button" class="passkey-btn hidden" id="passkeyLoginButton">
      <svg viewBox="0 0 24 24"><path d="M12 3a5 5 0 0 0-5 5v3a5 5 0 0 0 10 0V8a5 5 0 0 0-5-5Z"/><path d="M7 13v1a5 5 0 0 0 10 0v-1"/><path d="M12 19v2"/><path d="M9 21h6"/></svg>
      Face / Fingerprint
    </button>
    <div class="passkey-status" id="passkeyStatus"></div>

    <!-- Info banner for Android Face Unlock -->
    <div class="bio-info-banner">
      <div class="row">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span><strong>सुझाव:</strong> फोनमा Face Unlock ले काम नगरे फिंगरप्रिन्ट वा PIN प्रयोग गर्नुहोस् — एन्ड्रोइडले यिनलाई बढी सुरक्षित मान्छ।</span>
      </div>
    </div>

    <div class="footer">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      सुरक्षित जडान
    </div>
  </main>
  <script>
    const passkeyButton = document.getElementById("passkeyLoginButton");
    const passkeyStatus = document.getElementById("passkeyStatus");

    function bufferToBase64url(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";
      bytes.forEach((byte) => binary += String.fromCharCode(byte));
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function base64urlToBuffer(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/").padEnd(Math.ceil(value.length / 4) * 4, "=");
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes.buffer;
    }

    function prepareRequestOptions(options) {
      options.challenge = base64urlToBuffer(options.challenge);
      if (Array.isArray(options.allowCredentials)) {
        options.allowCredentials = options.allowCredentials.map((credential) => ({
          ...credential,
          id: base64urlToBuffer(credential.id)
        }));
      }
      return options;
    }

    function credentialToJSON(credential) {
      if (typeof credential.toJSON === "function") {
        return credential.toJSON();
      }
      return {
        id: credential.id,
        rawId: bufferToBase64url(credential.rawId),
        type: credential.type,
        response: {
          authenticatorData: bufferToBase64url(credential.response.authenticatorData),
          clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
          signature: bufferToBase64url(credential.response.signature),
          userHandle: credential.response.userHandle ? bufferToBase64url(credential.response.userHandle) : null
        },
        clientExtensionResults: credential.getClientExtensionResults()
      };
    }

    async function refreshPasskeyStatus() {
      if (!window.PublicKeyCredential) {
        return;
      }
      try {
        const response = await fetch("/passkey/status", { cache: "no-store" });
        if (!response.ok) {
          return;
        }
        const data = await response.json();
        if (data.available && data.registered) {
          passkeyButton.classList.remove("hidden");
        }
      } catch {
        /* Password login remains available. */
      }
    }

    passkeyButton.addEventListener("click", async () => {
      passkeyButton.disabled = true;
      passkeyStatus.textContent = "फोनको Face/Fingerprint खोल्दै...";
      try {
        const optionsResponse = await fetch("/passkey/authenticate/options", { method: "POST", cache: "no-store" });
        if (!optionsResponse.ok) {
          throw new Error("यो साइटमा passkey सेट गरिएको छैन।");
        }
        const options = prepareRequestOptions(await optionsResponse.json());
        const credential = await navigator.credentials.get({ publicKey: options });
        const verifyResponse = await fetch("/passkey/authenticate/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(credentialToJSON(credential))
        });
        if (!verifyResponse.ok) {
          throw new Error("Passkey login मिलेन।");
        }
        window.location.href = "/viewer";
      } catch (error) {
        passkeyStatus.textContent = error.message || "Passkey login असफल भयो।";
      } finally {
        passkeyButton.disabled = false;
      }
    });

    refreshPasskeyStatus();
  </script>
</body>
</html>
