<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Security Broadcast</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #090d16;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 80%;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(16, 185, 129, 0.3);
      box-shadow: 0 0 50px rgba(16, 185, 129, 0.15);
      animation: pulse-border 2s infinite alternate;
    }
    @keyframes pulse-border {
      0% { border-color: rgba(16, 185, 129, 0.3); box-shadow: 0 0 30px rgba(16, 185, 129, 0.1); }
      100% { border-color: rgba(16, 185, 129, 0.8); box-shadow: 0 0 60px rgba(16, 185, 129, 0.3); }
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin: 0 0 30px 0;
    }
    .close-hint {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔔 अभिभावकको सन्देश:</h1>
    <p>Oe</p>
    <div class="close-hint">यो विन्डो बन्द गर्न स्क्रिनमा क्लिक गर्नुहोस् वा 'Escape' कुञ्जी थिच्नुहोस्</div>
  </div>

  <script>
    window.focus();
    try {
      const speech = new SpeechSynthesisUtterance("New message: " + "Oe");
      window.speechSynthesis.speak(speech);
    } catch(e) {}

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") window.close();
    });
    document.body.addEventListener("click", () => {
      window.close();
    });
  </script>
</body>
</html>
