<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Video Message</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
    }
  </style>
</head>
<body>
  <video id="message" autoplay controls src="file:///C:/Users/alsth/Downloads/family_cctv_project/received_messages/message-20260624-120041-75cf15a2.webm"></video>
  <script>
    const video = document.getElementById("message");
    window.focus();
    video.volume = 1;
    video.play().catch(() => {});
    video.addEventListener("ended", () => window.close());
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") window.close();
    });
  </script>
</body>
</html>
