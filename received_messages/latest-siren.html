<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EMERGENCY SIREN</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      animation: flash-bg 0.5s infinite steps(2, start);
    }
    @keyframes flash-bg {
      0% { background: #ff0000; color: #fff; }
      50% { background: #0000ff; color: #fff; }
    }
    .card {
      background: rgba(0, 0, 0, 0.85);
      padding: 50px 80px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 0 100px rgba(255, 255, 255, 0.5);
      border: 5px solid #fff;
    }
    h1 {
      font-size: 5rem;
      margin: 0 0 20px 0;
      letter-spacing: 2px;
      animation: zoom 0.5s infinite alternate;
    }
    p {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0 0 30px 0;
    }
    .close-btn {
      padding: 15px 40px;
      font-size: 1.5rem;
      font-weight: 700;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }
    @keyframes zoom {
      from { transform: scale(0.95); }
      to { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚨 ALERT 🚨</h1>
    <p>सङ्कटकालीन साइरन बजिरहेको छ!</p>
    <button class="close-btn" onclick="window.close()">बन्द गर्नुहोस् (ESC)</button>
  </div>

  <script>
    window.focus();

    let audioCtx = null;
    let osc = null;
    let gainNode = null;
    let intervalId = null;

    function startSiren() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        osc = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);

        osc.start();

        let time = 0;
        intervalId = setInterval(() => {
          if (osc && audioCtx) {
            let freq = 850 + Math.sin(time) * 350;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            time += 0.25;
          }
        }, 30);
      } catch(e) {
        console.error("Audio API error:", e);
      }
    }

    window.addEventListener('load', () => {
      startSiren();
    });

    document.body.addEventListener("click", () => {
      if (!audioCtx) startSiren();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (intervalId) clearInterval(intervalId);
        window.close();
      }
    });

    window.addEventListener("beforeunload", () => {
      if (intervalId) clearInterval(intervalId);
    });
  </script>
</body>
</html>
